services:
  - type: web
    name: django-app
    env: python
    pythonVersion: 3.11
    region: oregon
    plan: free
    branch: main
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn mysite.wsgi:application --log-file - --log-level debug --workers $WEB_CONCURRENCY