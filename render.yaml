services:
  - type: web
    name: mysite
    runtime: python
    plan: free

    buildCommand: "./build.sh"

    startCommand: "gunicorn mysite.asgi:application -k uvicorn.workers.UvicornWorker"

    envVars:
      - key: SECRET_KEY
        generateValue: true

      - key: WEB_CONCURRENCY
        value: 4

      - key: DATABASE_URL
        sync: false