services:
  - type: web
    name: mysite
    plan: free
    runtime: python3.12

    buildCommand: |
      python -m venv .venv
      .venv/bin/pip install --upgrade pip
      .venv/bin/pip install -r requirements.txt

    startCommand: ".venv/bin/gunicorn mysite.asgi:application -k uvicorn.workers.UvicornWorker"

    envVars:
      - key: SECRET_KEY
        generateValue: true

      - key: WEB_CONCURRENCY
        value: 4

      - key: DATABASE_URL
        sync: false