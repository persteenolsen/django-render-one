services:
  - type: web
    name: mysite
    plan: free
    runtime: python3.12  # Ensure Python 3.12 is used

    # Install dependencies
    buildCommand: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt

    # Run migrations before starting the server
    startCommand: |
      python manage.py migrate --noinput
      gunicorn mysite.asgi:application -k uvicorn.workers.UvicornWorker

    envVars:
      - key: SECRET_KEY
        generateValue: true

      - key: WEB_CONCURRENCY
        value: 4

      - key: DATABASE_URL
        sync: false

    # Optional: clear build cache to force fresh Python environment
    # This can also be done from Render dashboard manually.
    # clearCache: true