services:
  - type: web
    name: mysite-app
    env: python
    pythonVersion: 3.12
    region: oregon
    plan: free
    branch: main
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn mysite.wsgi:application --log-file - --workers 4
    envVars:
      - key: SECRET_KEY
        value: 'YOUR_SECRET_KEY'
      - key: DATABASE_URL
        value: 'YOUR_NEON_DATABASE_URL'
      - key: DEBUG
        value: 'False'
      - key: WEB_CONCURRENCY
        value: "4"